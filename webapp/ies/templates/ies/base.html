<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pos-Graduacao Brasil{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <style>
        body { font-family: 'Segoe UI', sans-serif; }
        .navbar { background-color: #1a237e !important; }
        .navbar-brand, .nav-link { color: #fff !important; }
        .nav-link:hover { color: #90caf9 !important; }
        #mapa { height: 500px; width: 100%; border-radius: 8px; }
        .card-dashboard { transition: transform 0.2s; }
        .card-dashboard:hover { transform: translateY(-3px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .hero { background: linear-gradient(135deg, #1a237e, #283593); color: #fff; padding: 2rem 0; margin-bottom: 2rem; }
        footer { background-color: #f5f5f5; padding: 1.5rem 0; margin-top: 3rem; }

        /* Dark mode overrides */
        [data-bs-theme="dark"] .navbar { background-color: #0d1117 !important; }
        [data-bs-theme="dark"] .hero { background: linear-gradient(135deg, #0d1117, #1a2332); }
        [data-bs-theme="dark"] footer { background-color: #0d1117 !important; color: #8b949e; }
        [data-bs-theme="dark"] .card { border-color: #30363d; }
        [data-bs-theme="dark"] .card-header { background-color: #161b22; border-color: #30363d; }
        [data-bs-theme="dark"] .table { --bs-table-bg: transparent; }
        [data-bs-theme="dark"] #mapa-info { color: #8b949e !important; }
        [data-bs-theme="dark"] .form-select, [data-bs-theme="dark"] .form-control { background-color: #0d1117; color: #c9d1d9; border-color: #30363d; }
        [data-bs-theme="dark"] .btn-primary { --bs-btn-bg: #1a237e; --bs-btn-border-color: #1a237e; }

        /* Mapa dark: filtro CSS nos tiles do OpenStreetMap */
        .mapa-dark .leaflet-tile-pane img { filter: invert(1) hue-rotate(180deg) brightness(0.85) contrast(1.1) !important; }

        /* Theme toggle */
        #btn-theme { cursor: pointer; background: transparent; border: 1px solid rgba(255,255,255,0.3); color: #fff; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        #btn-theme:hover { background: rgba(255,255,255,0.15); }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-0">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'ies:index' %}">
                &#127758; Pos-Graduacao Brasil
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'ies:index' %}">Mapa</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'ies:consulta' %}">Consulta</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'ies:dashboard' %}">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/">Admin</a>
                    </li>
                    <li class="nav-item ms-2 d-flex align-items-center">
                        <button id="btn-theme" title="Alternar tema">
                            <i id="theme-icon" class="bi bi-moon-fill"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <footer class="text-center text-muted">
        <div class="container">
            <p class="mb-1">Plataforma Georreferenciada de Programas de Pos-Graduacao no Brasil</p>
            <small>UNIVESP - Projeto Integrador - Grupo 11 - 2026</small>
        </div>
    </footer>

    <script>
        (function() {
            const html = document.documentElement;
            const btn = document.getElementById('btn-theme');
            const icon = document.getElementById('theme-icon');
            
            // Load saved theme
            const saved = localStorage.getItem('theme');
            if (saved === 'dark') {
                html.setAttribute('data-bs-theme', 'dark');
                icon.className = 'bi bi-sun-fill';
            }
            
            // Toggle on click
            btn.addEventListener('click', function() {
                const current = html.getAttribute('data-bs-theme');
                const next = current === 'dark' ? 'light' : 'dark';
                html.setAttribute('data-bs-theme', next);
                localStorage.setItem('theme', next);
                icon.className = next === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
                
                // Dispatch event for map to switch tiles
                window.dispatchEvent(new CustomEvent('themechange', {detail: next}));
            });
        })();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
