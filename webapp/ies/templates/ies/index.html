{% extends "ies/base.html" %}
{% block title %}Mapa - Pos-Graduacao Brasil{% endblock %}

{% block content %}
<div class="hero">
    <div class="container">
        <h1 class="h3 mb-2">Mapa Interativo</h1>
        <p class="mb-0 opacity-75">Visualize programas de pos-graduacao em todo o Brasil</p>
    </div>
</div>

<div class="container">
    <!-- Busca por endereco/CEP -->
    <div class="card mb-3">
        <div class="card-body">
            <div class="row g-3 align-items-end">
                <div class="col-md-5">
                    <label class="form-label fw-bold">Buscar endereco</label>
                    <div class="input-group">
                        <input type="text" id="busca-endereco" class="form-control" placeholder="Ex: Rua XV de Novembro, Sao Paulo, SP ou CEP 01001-000">
                        <button id="btn-buscar" class="btn btn-success">🔍 Ir ate la</button>
                    </div>
                    <div id="busca-status" class="form-text"></div>
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-bold">Raio (km)</label>
                    <select id="filtro-raio" class="form-select">
                        <option value="50">50 km</option>
                        <option value="100" selected>100 km</option>
                        <option value="200">200 km</option>
                        <option value="500">500 km</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- Filtros -->
    <div class="card mb-3">
        <div class="card-body">
            <form id="filtros-mapa" class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label class="form-label fw-bold">Estado (UF)</label>
                    <select name="uf" id="filtro-uf" class="form-select">
                        <option value="">Todos</option>
                        {% for estado in estados %}
                        <option value="{{ estado.sigla }}">{{ estado.sigla }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">Status Juridico</label>
                    <select name="status" id="filtro-status" class="form-select">
                        <option value="">Todos</option>
                        {% for s in status_list %}
                        <option value="{{ s }}">{{ s }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">Modalidade</label>
                    <select name="modalidade" id="filtro-modalidade" class="form-select">
                        <option value="">Todas</option>
                        <option value="mestrado">Mestrado</option>
                        <option value="doutorado">Doutorado</option>
                        <option value="especializacao">Especializacao</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-bold">Busca</label>
                    <input type="text" name="q" id="filtro-busca" class="form-control" placeholder="Nome ou sigla...">
                </div>
                <div class="col-md-1">
                    <button type="submit" class="btn btn-primary w-100">Filtrar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Mapa -->
    <div id="mapa"></div>
    <div id="mapa-info" class="text-muted mt-2 small"></div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
    // Inicializar mapa centrado no Brasil
    const mapa = L.map('mapa').setView([-14.5, -52], 4);

    // Tiles padrao OpenStreetMap
    const tilesOSM = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors',
        maxZoom: 18,
    }).addTo(mapa);

    // Escutar mudanca de tema - aplica filtro CSS nos tiles
    function aplicarTemaEscuro(escuro) {
        const tileEls = document.querySelectorAll('#mapa .leaflet-tile-pane img');
        tileEls.forEach(img => {
            img.style.filter = escuro ? 'invert(1) hue-rotate(180deg) brightness(0.85) contrast(1.1)' : '';
        });
        // Tambem aplica nos tiles que vao carregar depois
        const observer = escuro ? new MutationObserver(() => aplicarTemaEscuro(true)) : null;
        if (observer) observer.observe(document.querySelector('#mapa .leaflet-tile-pane'), { childList: true, attributes: true });
    }

    window.addEventListener('themechange', function(e) {
        aplicarTemaEscuro(e.detail === 'dark');
    });

    // Aplica tema inicial se ja estiver escuro
    if (document.documentElement.getAttribute('data-bs-theme') === 'dark') {
        aplicarTemaEscuro(true);
    }

    let markersLayer = L.markerClusterGroup({
        maxClusterRadius: 50,
        spiderfyOnMaxZoom: true,
    });
    mapa.addLayer(markersLayer);

    // Busca por endereco/CEP com Nominatim (OpenStreetMap)
    let circuloDestaque = null;
    let ultimaBusca = null; // {lat, lng, iesData}
    
    function calcularDistancia(lat1, lng1, lat2, lng2) {
        const R = 6371; // raio da Terra em km
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLng = (lng2 - lng1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
                  Math.sin(dLng/2) * Math.sin(dLng/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function atualizarMarcadoresRaio() {
        if (!ultimaBusca) return;
        const raioKm = parseInt(document.getElementById('filtro-raio').value);
        const {lat, lng, iesData} = ultimaBusca;
        
        // Atualiza circulo
        if (circuloDestaque) {
            circuloDestaque.setRadius(raioKm * 1000);
        }
        
        markersLayer.clearLayers();
        let visiveis = 0;
        
        iesData.ies.forEach(ies => {
            const dist = calcularDistancia(lat, lng, ies.lat, ies.lng);
            if (dist > raioKm) return;
            visiveis++;
            
            let modalidades = [];
            if (ies.mestrado) modalidades.push('Mestrado');
            if (ies.doutorado) modalidades.push('Doutorado');
            if (ies.especializacao) modalidades.push('Especializacao');

            let popup = `<strong>${ies.sigla || ''}</strong> - ${ies.nome}<br>
                <small>${ies.endereco || ''}</small><br>
                <small><b>Distancia:</b> ${dist.toFixed(1)} km</small><br>
                <small><b>UF:</b> ${ies.uf} | <b>Status:</b> ${ies.status || 'N/I'}</small><br>
                ${modalidades.length ? '<small><b>Modalidades:</b> ' + modalidades.join(', ') + '</small><br>' : ''}
                ${ies.nota_capes ? '<small><b>Nota CAPES:</b> ' + ies.nota_capes + '</small><br>' : ''}
                <a href="/ies/${ies.id}/">Ver detalhes</a>`;

            let marker = L.marker([ies.lat, ies.lng]).bindPopup(popup);
            markersLayer.addLayer(marker);
        });
        
        document.getElementById('mapa-info').textContent = 
            `${visiveis} IES num raio de ${raioKm} km do endereco buscado`;
    }

    // Atualizar mapa ao mudar o raio
    document.getElementById('filtro-raio').addEventListener('change', function() {
        atualizarMarcadoresRaio();
    });

    document.getElementById('btn-buscar').addEventListener('click', function() {
        const query = document.getElementById('busca-endereco').value.trim();
        const statusEl = document.getElementById('busca-status');
        
        if (!query) {
            statusEl.textContent = 'Digite um endereco ou CEP';
            return;
        }

        const btn = this;
        btn.disabled = true;
        btn.textContent = 'Buscando...';
        statusEl.textContent = '';

        // Geocodificacao com Nominatim
        const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=br&q=${encodeURIComponent(query)}`;
        
        fetch(url, {
            headers: { 'User-Agent': 'PI-UNIVESP-PosGraduacaoBrasil/1.0' }
        })
        .then(r => r.json())
        .then(data => {
            btn.disabled = false;
            btn.textContent = '🔍 Ir ate la';
            
            if (data.length === 0) {
                statusEl.textContent = 'Endereco nao encontrado. Tente "Cidade, UF" ou CEP.';
                return;
            }

            const lat = parseFloat(data[0].lat);
            const lng = parseFloat(data[0].lon);
            const displayName = data[0].display_name;
            const raioKm = parseInt(document.getElementById('filtro-raio').value);

            statusEl.textContent = `📍 ${displayName.substring(0, 80)}...`;

            // Move o mapa ate o local
            mapa.setView([lat, lng], 11);
            
            // Remove circulo anterior
            if (circuloDestaque) {
                mapa.removeLayer(circuloDestaque);
            }
            
            // Adiciona circulo de raio
            circuloDestaque = L.circle([lat, lng], {
                radius: raioKm * 1000,
                color: '#198754',
                fillColor: '#198754',
                fillOpacity: 0.08,
                weight: 2
            }).addTo(mapa);
            
            // Adiciona marcador no local buscado
            L.marker([lat, lng], {
                draggable: false,
                opacity: 0.7
            })
            .bindPopup(`<strong>📍 Local buscado</strong><br>${displayName.substring(0, 100)}`)
            .addTo(mapa);

            // Filtrar IES por distancia e guardar para uso futuro
            const apiUrl = `/api/ies/?limit=8000&uf=${document.getElementById('filtro-uf').value}&modalidade=${document.getElementById('filtro-modalidade').value}&status=${document.getElementById('filtro-status').value}&q=${encodeURIComponent(document.getElementById('filtro-busca').value)}`;
            
            fetch(apiUrl)
                .then(r => r.json())
                .then(iesData => {
                    ultimaBusca = {lat, lng, iesData};
                    atualizarMarcadoresRaio();
                });
        })
        .catch(err => {
            btn.disabled = false;
            btn.textContent = '🔍 Ir ate la';
            statusEl.textContent = 'Erro ao buscar. Tente novamente.';
            console.error(err);
        });
    });

    // Permitir buscar com Enter
    document.getElementById('busca-endereco').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            document.getElementById('btn-buscar').click();
        }
    });

    // Funcoes existentes do mapa
    function carregarIES() {
        const uf = document.getElementById('filtro-uf').value;
        const status = document.getElementById('filtro-status').value;
        const modalidade = document.getElementById('filtro-modalidade').value;
        const busca = document.getElementById('filtro-busca').value;

        let url = '/api/ies/?limit=8000';
        if (uf) url += '&uf=' + uf;
        if (status) url += '&status=' + status;
        if (modalidade) url += '&modalidade=' + modalidade;
        if (busca) url += '&q=' + encodeURIComponent(busca);

        fetch(url)
            .then(r => r.json())
            .then(data => {
                markersLayer.clearLayers();
                data.ies.forEach(ies => {
                    let modalidades = [];
                    if (ies.mestrado) modalidades.push('Mestrado');
                    if (ies.doutorado) modalidades.push('Doutorado');
                    if (ies.especializacao) modalidades.push('Especializacao');

                    let popup = `
                        <strong>${ies.sigla || ''}</strong> - ${ies.nome}<br>
                        <small>${ies.endereco || ''}</small><br>
                        <small><b>Status:</b> ${ies.status || 'N/I'} | <b>UF:</b> ${ies.uf}</small><br>
                        ${modalidades.length ? '<small><b>Modalidades:</b> ' + modalidades.join(', ') + '</small><br>' : ''}
                        ${ies.nota_capes ? '<small><b>Nota CAPES:</b> ' + ies.nota_capes + '</small><br>' : ''}
                        ${ies.homepage ? '<a href="' + ies.homepage + '" target="_blank">Homepage</a><br>' : ''}
                        <a href="/ies/${ies.id}/">Ver detalhes</a>
                    `;

                    let marker = L.marker([ies.lat, ies.lng])
                        .bindPopup(popup);
                    markersLayer.addLayer(marker);
                });

                document.getElementById('mapa-info').textContent =
                    `${data.total} IES exibidas no mapa`;
            });
    }

    document.getElementById('filtros-mapa').addEventListener('submit', function(e) {
        e.preventDefault();
        carregarIES();
    });

    // Carregar dados iniciais
    carregarIES();
</script>
{% endblock %}
